services:
  dreamforge:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dreamforge-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/data/dreamforge.db
      - DATA_DIR=/data/projects
      - PUBLIC_ALLOW_REGISTRATION=true
      - ADMIN_EMAIL=admin@dreamforge.local
      - ADMIN_PASSWORD=changeme
    volumes:
      - .:/app
      - /app/node_modules
      - dreamforge-dev-data:/data

volumes:
  dreamforge-dev-data:
    driver: local
