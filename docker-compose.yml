services:
  dreamforge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dreamforge
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/data/dreamforge.db
      - DATA_DIR=/data/projects
      - PUBLIC_ALLOW_REGISTRATION=${PUBLIC_ALLOW_REGISTRATION:-true}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@dreamforge.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    volumes:
      - dreamforge-data:/data

volumes:
  dreamforge-data:
    driver: local
